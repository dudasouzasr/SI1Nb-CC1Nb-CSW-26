<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula-09</title>
</head>
<h1>Formulário - Aula 09</h1>

<body>
    <table border="1">
        <tbody>
            <form action="mailto:dudasouzasr@gmail.coom" method="post">
                <tr>
                    <td><label for="Nome"> Nome </label></td>
                    <td> <input type="text" name="nome-usuario" size="50" maxlength="30" value=""
                            placeholder="Digite o Nome do usuário"></td>
                </tr>

                <tr>
                    <td><label for="email"> E-mail pessoal:</label></td>
                    <td><input type="email" id="email" name="email" size="50" maxlength="30" value=""
                            placeholder="Digite seu E-mail Pessoal"></td>
                </tr>

                <tr>
                    <td><label for="email"> E-mail (patter):</label></td>
                    <td><input type="email" id="email" name="email" size="50" maxlength="30" value=""
                            placeholder="Digite seu E-mail (patter)"></td>
                </tr>
                <tr>
                    <td><label for="Senha">Senha:</label></td>
                    <td><input type="password" id="senha" name="senha" size="50" maxlength="30"
                            placeholder="Digite sua Senha">
                    </td>
                </tr>
                <tr>
                    <td><label for="idade">Idade:</label></td>
                    <td><input type="number" id="idade" name="idade" size="50" maxlength="30" value=""
                            placeholder="Digite sua Idade"></td>
                </tr>
                </tr>
                <tr>
                    <td colspan="2">
                        <p>Deixe um comentário</p><textarea name="comentario" cols="50" rows="10"
                            placeholder="Deixe um comentário"></textarea>
                    </td>
                </tr>
                <tr>
                    <td>
                        <label for="checkbox"> Matéria de Interesse:</label>
                        <br>
                        <input type="checkbox" name="auto" value=""> Backend
                        <br>
                        <input type="checkbox" name="auto" value=""> FrontEnd
                        <br>
                        <input type="checkbox" name="auto" value=""> FullStack
                    </td>

                    <td>
                        <label for="select">Tipo de Viagem</label>
                        <br>
                        <input type="radio">Negócios
                        <br>
                        <input type="radio">Lazer
                        <br>
                        <input type="radio">Turismo
                        <br>
                        <input type="radio">Acadêmico
                    </td>
                </tr>
                <tr>
                    <td><label for="selecionar"> Esporte Favorito:</label>
                        <select value="Locais" size="4">
                            <option value="Futebol">Futebol</option>
                            <option value="Basquete">Basquete</option>
                            <option value="Vôlei">Futebol</option>
                            <option value="Tênis">Tênis</option>
                        </select>
                    </td>

                    <td><label for="selecionar"> Investimentos</label>
                        <select value="Tiposdeinvestimentos" size="1">
                            <option value="poupança">Poupança</option>
                            <option value="cdb">CDB</option>
                            <option value="tesourodireto">Tesouro direto</option>
                            <option value="fundosimobiliarios">Fundos Imobiliários</option>
                            <option value="cdi">CDi</option>
                            <option value="debentures">Debêntures</option>
                            <option value="criptomoedas">Cripto Moedas</option>
                            <option value="acoes">Ações</option>
                        </select>
                    </td>
                </tr>
                <tr>
                    <td><label for="escolhercor">Selecione a cor</label>
                    <select value="tipodecor" size="1">
                        <option value="cor" style="color: black;"></option>
                    </select></td>
                </tr>
            </form>

        </tbody>
    </table>



</body>

</html>
